services:
  - type: web
    name: echomeet-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://echomeet-frontend-t85p.onrender.com

  - type: web
    name: echomeet-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PUBLIC_APP_URL
        value: https://echomeet-frontend-t85p.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_LIVEKIT_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
