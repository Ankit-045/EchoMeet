<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="cam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Video camera icon -->
  <g transform="translate(106, 156)" fill="url(#cam)">
    <rect x="0" y="20" width="210" height="160" rx="28" ry="28"/>
    <polygon points="230,55 300,95 300,145 230,185"/>
  </g>
  <!-- AI sparkle dot -->
  <circle cx="380" cy="150" r="18" fill="#fbbf24"/>
  <circle cx="380" cy="150" r="7" fill="#ffffff"/>
